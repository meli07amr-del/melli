<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Éducation</title>

  <!-- Script Dialogflow Messenger v4 (plus stable) -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=4"></script>

  <!-- Style simple -->
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
    }

    h1 {
      margin-top: 50px;
      color: #333;
    }

    p {
      color: #555;
    }

    df-messenger {
      --df-messenger-bot-message: #e0e0e0;
      --df-messenger-button-titlebar-color: #4CAF50;
      --df-messenger-chat-background-color: #ffffff;
      --df-messenger-font-color: black;
      --df-messenger-user-message: #4CAF50;
      --df-messenger-send-icon: #4CAF50;

      position: fixed;
      bottom: 16px;
      right: 16px;
    }
  </style>
</head>

<body>

  <h1>🎓 Bienvenue sur le Chatbot Éducation</h1>
  <p>Posez vos questions sur l’intelligence artificielle et l’apprentissage 📚</p>

  <!-- Chatbot Dialogflow Messenger -->
  <df-messenger
    chat-title="ChatbotEducation"
    agent-id="6d81d340-2555-4b13-a648-f47dc3f67ade"
    language-code="fr">
  </df-messenger>

</body>
</html>
